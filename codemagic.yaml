workflows:
  ios_unsigned_ipa:
    name: iOS Unsigned IPA Workflow
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - $HOME/Library/Caches/CocoaPods
        - ios/Pods

    scripts:
      - name: Flutter pub get
        script: |
          flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios
          pod install
          cd ..

      - name: Analyze
        script: |
          flutter analyze || true

      - name: Test
        script: |
          flutter test || true

      - name: Prepare iOS build files without code signing
        script: |
          flutter build ios --release --config-only --no-codesign

      - name: Archive unsigned app
        script: |
          rm -rf build/ios/archive
          xcodebuild archive \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/ios/archive/Runner.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: Package unsigned IPA
        script: |
          rm -rf build/ios/ipa
          mkdir -p build/ios/ipa/Payload
          cp -R build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r Wasl-AlMuslim-unsigned.ipa Payload

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive
