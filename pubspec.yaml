name: wasl_al_muslim
description: A premium Islamic athkar app for iPhone and Android with elegant design and smooth UX.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  
  # Routing
  go_router: ^12.1.1
  
  # Persistence
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Notifications
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2
  
  # UI & Styling
  google_fonts: ^6.1.0
  intl: ^0.20.2
  
  # SVG & Utilities
  flutter_svg: ^2.0.9
  url_launcher: ^6.2.1
  share_plus: ^7.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/data/
    - assets/images/
    - assets/icons/
